<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPod OS Pro</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            position: relative;
        }

        /* 1. ДИНАМІЧНИЙ AMBIENT ФОН */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) opacity(0.35);
            z-index: -1;
            transition: background-image 0.8s ease-in-out;
            pointer-events: none;
        }

        /* ЕКРАН iPOD */
        .ipod-screen-container {
            width: 85%;
            max-width: 350px;
            height: 40vh;
            background: #e4e6eb;
            border-radius: 12px;
            border: 4px solid #1a1a1a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            color: #000;
            z-index: 2;
        }

        .screen-header {
            background: linear-gradient(to bottom, #fcfcfc, #cfd1d6);
            height: 30px;
            border-bottom: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Контентна зона екрана */
        .screen-body {
            height: calc(100% - 30px);
            position: relative;
            background: #e4e6eb;
        }

        .view-layout {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .menu-item {
            padding: 8px 12px;
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
        }

        .menu-item.active {
            background: linear-gradient(to bottom, #4b92db, #1459a9);
            color: white;
        }

        /* Режим Now Playing */
        .view-now-playing {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px;
            height: 100%;
            justify-content: space-between;
        }

        .album-art {
            width: 110px;
            height: 110px;
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        .np-info { text-align: center; width: 100%; }
        .np-title { font-weight: bold; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .np-artist { font-size: 13px; color: #555; }

        /* 2. ІНДИКАТОР ГУЧНОСТІ (VOLUME BAR) */
        .volume-container {
            width: 80%;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-top: 5px;
        }
        .volume-bar-outer {
            flex-grow: 1;
            height: 8px;
            background: #bdc3c7;
            border: 1px solid #95a5a6;
            border-radius: 2px;
            overflow: hidden;
        }
        .volume-bar-inner {
            width: 50%; /* Буде мінятися з JS */
            height: 100%;
            background: linear-gradient(to bottom, #7f8c8d, #34495e);
        }

        /* CLICK WHEEL */
        .wheel-container {
            width: 280px;
            height: 280px;
            background: #1c1c1c; 
            border-radius: 50%;
            margin-top: 10vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 5px 15px rgba(0,0,0,0.8);
            touch-action: none;
            z-index: 2;
        }

        .wheel-label {
            position: absolute;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
        }
        .label-menu { top: 20px; }
        .label-play { bottom: 20px; font-size: 18px; }
        .label-prev { left: 20px; font-size: 18px; }
        .label-next { right: 20px; font-size: 18px; }

        .center-button {
            width: 100px;
            height: 100px;
            background: #000000;
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 2px 10px rgba(0,0,0,0.5);
        }

        #youtube-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-bg"></div>

    <div id="youtube-player"></div>

    <div class="ipod-screen-container">
        <div class="screen-header">
            <span id="header-title">iPod</span>
            <span>🔋</span>
        </div>

        <div class="screen-body">
            <div class="view-layout" id="view-menu"></div>

            <div class="view-now-playing" id="view-now-playing">
                <img src="" id="np-cover" class="album-art" alt="Cover">
                <div class="np-info">
                    <div class="np-title" id="np-title">Назва</div>
                    <div class="np-artist" id="np-artist">Артист</div>
                </div>
                <div class="volume-container">
                    <span>🔈</span>
                    <div class="volume-bar-outer"><div class="volume-bar-inner" id="volume-indicator"></div></div>
                    <span>🔊</span>
                </div>
            </div>
        </div>
    </div>

    <div class="wheel-container" id="wheel">
        <div class="wheel-label label-menu">MENU</div>
        <div class="wheel-label label-prev">|◁</div>
        <div class="wheel-label label-next">▷|</div>
        <div class="wheel-label label-play">▶||</div>
        <div class="center-button" id="btn-center"></div>
    </div>

    <script>
        // 3. БАЗА ДАНИХ (ДЕФОЛТНА + LOCALSTORAGE)
        const defaultLibrary = {
            'Плейлисти': ['Lofi Chill', 'Rock Anthems', 'Favorites'],
            'Lofi Chill': [
                { id: 'jfKfPfyJRdk', title: 'Lofi Girl Beats', artist: 'Lofi Girl' },
                { id: '5qap5aO4i9A', title: 'Coffee Shop Vibes', artist: 'ChilledCow' }
            ],
            'Rock Anthems': [
                { id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up', artist: 'Rick Astley' }
            ],
            'Favorites': [
                { id: '9XAS9G7m0VE', title: 'Interstellar Theme', artist: 'Hans Zimmer' },
                { id: 'V1Pl8CzNzCw', title: 'Blinding Lights', artist: 'The Weeknd' }
            ]
        };

        // Завантажуємо дані з пам'яті телефону або беремо дефолтні
        let library = JSON.parse(localStorage.getItem('ipod_library')) || defaultLibrary;

        // Навігаційний стек (щоб повертатися назад по MENU)
        let menuStack = ['Плейлисти']; 
        let selectedIndex = 0;
        let currentView = 'menu'; // 'menu' або 'nowPlaying'
        
        let player;
        let currentVolume = 50;
        let currentPlaylistContext = [];
        let playingIndex = 0;

        // YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
                events: { 
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) nextTrack();
                    },
                    'onReady': () => { player.setVolume(currentVolume); }
                }
            });
        }

        // РЕНДЕР ПОТОЧНОГО МЕНЮ
        const menuView = document.getElementById('view-menu');
        function renderCurrentMenu() {
            menuView.innerHTML = '';
            const currentKey = menuStack[menuStack.length - 1];
            const items = library[currentKey] || [];

            document.getElementById('header-title').textContent = currentKey;

            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `menu-item ${index === selectedIndex ? 'active' : ''}`;
                
                if (typeof item === 'string') {
                    // Це папка (плейлист)
                    div.innerHTML = `<span>📂 ${item}</span><span>▶</span>`;
                } else {
                    // Це конкретний трек
                    div.innerHTML = `<span>🎵 ${item.title}</span>`;
                }
                menuView.appendChild(div);
            });
        }
        renderCurrentMenu();

        // АУДІО КЛІК
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.03);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        // КЕРУВАННЯ КОЛЕСОМ (МЕНЮ ТА ГУЧНІСТЬ)
        const wheel = document.getElementById('wheel');
        let lastAngle = 0;
        let angleAccumulator = 0;

        wheel.addEventListener('touchstart', (e) => {
            const rect = wheel.getBoundingClientRect();
            const x = e.touches[0].clientX - (rect.left + rect.width / 2);
            const y = e.touches[0].clientY - (rect.top + rect.height / 2);
            lastAngle = Math.atan2(y, x) * (180 / Math.PI);
        });

        wheel.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = wheel.getBoundingClientRect();
            const currentKey = menuStack[menuStack.length - 1];
            const maxItems = library[currentKey] ? library[currentKey].length : 0;

            const x = e.touches[0].clientX - (rect.left + rect.width / 2);
            const y = e.touches[0].clientY - (rect.top + rect.height / 2);
            let currentAngle = Math.atan2(y, x) * (180 / Math.PI);
            let delta = currentAngle - lastAngle;
            
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            angleAccumulator += delta;
            lastAngle = currentAngle;

            if (Math.abs(angleAccumulator) > 18) {
                const direction = angleAccumulator > 0 ? 1 : -1;

                if (currentView === 'menu') {
                    // Режим меню: гортаємо пункти
                    selectedIndex = Math.max(0, Math.min(selectedIndex + direction, maxItems - 1));
                    renderCurrentMenu();
                    playClickSound();
                } else if (currentView === 'nowPlaying') {
                    // Режим плеєра: КЕРУЄМО ГУЧНІСТЮ
                    currentVolume = Math.max(0, Math.min(currentVolume + (direction * 4), 100));
                    if (player) player.setVolume(currentVolume);
                    document.getElementById('volume-indicator').style.width = `${currentVolume}%`;
                    playClickSound();
                }
                angleAccumulator = 0;
            }
        });

        // КЛІКИ НА КНОПКИ КОЛЕСА
        const viewMenuNode = document.getElementById('view-menu');
        const viewNowPlayingNode = document.getElementById('view-now-playing');

        wheel.addEventListener('click', (e) => {
            const rect = wheel.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Клікнули зверху (MENU) -> Крок назад по папках
            if (y < 60) {
                playClickSound();
                if (currentView === 'nowPlaying') {
                    switchToView('menu');
                } else if (menuStack.length > 1) {
                    menuStack.pop();
                    selectedIndex = 0;
                    renderCurrentMenu();
                }
            }

            // Клікнули знизу (PLAY/PAUSE)
            if (y > rect.height - 60 && player) {
                playClickSound();
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) player.pauseVideo();
                else player.playVideo();
            }
        });

        // ЦЕНТРАЛЬНА КНОПКА (SELECT + СЕКРЕТНИЙ ВХІД НА 4 КЛІКИ)
        let centerClickCount = 0;
        let centerClickTimer = null;

        document.getElementById('btn-center').addEventListener('click', () => {
            playClickSound();
            centerClickCount++;
            if (centerClickTimer) clearTimeout(centerClickTimer);

            if (centerClickCount === 4) {
                addNewTrackPrompt(); // Виклик секретного вікна
                centerClickCount = 0;
                return;
            }

            centerClickTimer = setTimeout(() => {
                // Якщо це був одиночний клік
                if (centerClickCount === 1) {
                    handleSelect();
                }
                centerClickCount = 0;
            }, 350);
        });

        function handleSelect() {
            const currentKey = menuStack[menuStack.length - 1];
            const selectedItem = library[currentKey][selectedIndex];

            if (typeof selectedItem === 'string') {
                // Заходимо в папку плейлиста
                menuStack.push(selectedItem);
                selectedIndex = 0;
                renderCurrentMenu();
            } else if (selectedItem) {
                // Запускаємо трек
                currentPlaylistContext = library[currentKey];
                playingIndex = selectedIndex;
                playTrack(selectedItem);
            }
        }

        function playTrack(track) {
            currentView = 'nowPlaying';
            switchToView('nowPlaying');

            document.getElementById('np-title').textContent = track.title;
            document.getElementById('np-artist').textContent = track.artist;
            
            const imgUrl = `https://img.youtube.com/vi/${track.id}/hqdefault.jpg`;
            document.getElementById('np-cover').src = imgUrl;
            
            // Оновлюємо динамічний розмитий фон
            document.getElementById('ambient-bg').style.backgroundImage = `url('${imgUrl}')`;
            document.getElementById('volume-indicator').style.width = `${currentVolume}%`;

            if (player) {
                player.loadVideoById(track.id);
                player.playVideo();
            }
        }

        function nextTrack() {
            if (currentPlaylistContext.length > 0) {
                playingIndex = (playingIndex + 1) % currentPlaylistContext.length;
                playTrack(currentPlaylistContext[playingIndex]);
            }
        }

        function switchToView(view) {
            currentView = view;
            if (view === 'menu') {
                viewMenuNode.style.display = 'flex';
                viewNowPlayingNode.style.display = 'none';
                renderCurrentMenu();
            } else {
                viewMenuNode.style.display = 'none';
                viewNowPlayingNode.style.display = 'flex';
                document.getElementById('header-title').textContent = 'Now Playing';
            }
        }

        // 4. СЕКРЕТНИЙ ФУНКЦІОНАЛ ДОДАВАННЯ ТРЕКІВ
        function addNewTrackPrompt() {
            const url = prompt("Встав посилання на YouTube відео:");
            if (!url) return;

            // Регулярка для вирізання ID відео
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            
            if (match && match[2].length === 11) {
                const videoId = match[2];
                const title = prompt("Введіть назву треку:") || "Unknown Title";
                const artist = prompt("Введіть артиста:") || "Unknown Artist";
                
                // Вибір папки
                const currentKey = menuStack[menuStack.length - 1];
                let targetPlaylist = 'Favorites'; // за замовчуванням
                
                if (currentKey !== 'Плейлисти' && library[currentKey]) {
                    targetPlaylist = currentKey;
                }

                // Додаємо в базу
                library[targetPlaylist].push({ id: videoId, title: title, artist: artist });
                
                // Зберігаємо в пам'ять телефону
                localStorage.setItem('ipod_library', JSON.stringify(library));
                
                alert(`Збережено в плейлист "${targetPlaylist}"!`);
                renderCurrentMenu();
            } else {
                alert("Невірне посилання на YouTube!");
            }
        }
    </script>
</body>
</html>
