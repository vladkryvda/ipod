<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iPod">
    
    <title>iPod Classic</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%2275%22 x=%2215%22 font-size=%2275%22 fill=%22white%22></text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2280%22 font-size=%2280%22 fill=%22white%22></text></svg>">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ЦЕНТРОВАНЕ ТІЛО ПЛЕЄРА (ЯК НА GITHUB) */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Центруємо весь девайс на екрані */
            padding: 20px 0;
            position: relative;
            transition: background 0.5s ease, color 0.5s ease;
        }

        body.aluminum-theme {
            background: linear-gradient(135deg, #2c302e 0%, #4a5154 50%, #23272a 100%);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
        }

        /* КАНOНІЧНИЙ ЕКРАН */
        .ipod-screen-container {
            width: 88%;
            max-width: 320px;
            height: 240px; /* Чисті оригінальні пропорції */
            flex-shrink: 0;
            background: #e4e6eb;
            border-radius: 6px;
            border: 4px solid #1c1d21;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            color: #000;
            z-index: 2;
        }

        body.aluminum-theme .ipod-screen-container {
            border-color: #7f8c8d;
            box-shadow: 0 0 0 1px #bdc3c7, inset 0 2px 5px rgba(0,0,0,0.3), 0 3px 10px rgba(0,0,0,0.4);
        }

        .screen-header {
            background: linear-gradient(to bottom, #fcfcfc, #cfd1d6);
            height: 24px;
            border-bottom: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-weight: 700;
            font-size: 12px;
        }

        .screen-body {
            height: calc(100% - 24px);
            position: relative;
            background: #e4e6eb;
        }

        /* ОРИГІНАЛЬНЕ МЕНЮ З СКРОЛОМ */
        .view-layout {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
        }
        .view-layout::-webkit-scrollbar { width: 0; display: none; }

        /* ОРИГІНАЛЬНИЙ СТИЛЬ РЯДКА: "Artist - Title" */
        .menu-item {
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #000000;
            border-bottom: 1px solid #dbdbe0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #e4e6eb;
        }

        .menu-item.active {
            background: linear-gradient(to bottom, #428fd4, #1254a3);
            color: #ffffff;
            border-bottom-color: #1254a3;
        }

        /* ЕКРАН NOW PLAYING */
        .view-now-playing {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            height: 100%;
            background: linear-gradient(to bottom, #f3f4f6, #dcdde2);
        }

        .album-art {
            width: 125px !important;
            height: 125px !important;
            border-radius: 2px;
            object-fit: cover !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #999;
        }

        .np-info { 
            text-align: center; 
            width: 100%; 
        }
        
        .np-title { 
            font-weight: 700; 
            font-size: 14px; 
            color: #111;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        .np-artist { 
            font-size: 12px; 
            color: #555; 
            margin-top: 1px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        /* ПРОГРЕС-БАР */
        .progress-container {
            width: 94%;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: bold;
            color: #333;
            margin-bottom: 2px;
        }
        
        .progress-bar-outer {
            flex-grow: 1;
            height: 6px;
            background: #d1d5db;
            border: 1px solid #b5b8be;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .progress-bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(to bottom, #529ee6, #165ca8);
        }

        /* ПРАВИЛЬНЕ РОЗМІЩЕННЯ CLICK WHEEL (ОПУЩЕНО ВНИЗ НА 50px) */
        .wheel-container {
            width: 270px;
            height: 270px;
            background: radial-gradient(circle, #2c2e33 0%, #17181c 80%, #0f1012 100%); 
            border-radius: 50%;
            margin-top: 50px; /* Автентичний простір між екраном та колесом */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 
                        0 8px 25px rgba(0,0,0,0.6),
                        0 0 0 2px #111;
            touch-action: none;
            z-index: 2;
        }

        body.aluminum-theme .wheel-container {
            background: radial-gradient(circle, #3a3f41 0%, #26292a 80%, #191b1c 100%);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 
                        0 6px 20px rgba(0,0,0,0.4),
                        0 0 0 2px #222;
        }

        /* ОРИГІНАЛЬНІ КНОПКИ */
        .wheel-label {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #8a8e99;
            fill: #8a8e99;
        }

        body.aluminum-theme .wheel-label {
            color: #b0b5c2;
            fill: #b0b5c2;
        }

        .label-menu { 
            top: 22px; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        .label-play { bottom: 22px; width: 26px; height: 15px; } 
        .label-prev { left: 22px; width: 18px; height: 16px; }
        .label-next { right: 22px; width: 18px; height: 16px; }

        /* Внутрішня кнопка Select */
        .center-button {
            width: 90px;
            height: 90px;
            background: #090a0c;
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.1), 0 3px 8px rgba(0,0,0,0.4);
        }

        .center-button:active { background: #111215; }

        body.aluminum-theme .center-button {
            background: #2c302e;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 2px 6px rgba(0,0,0,0.4);
        }
        body.aluminum-theme .center-button:active { background: #202322; }

        #youtube-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="youtube-player"></div>

    <div class="ipod-screen-container">
        <div class="screen-header">
            <span id="header-title">iPod</span>
            <span>🔋</span>
        </div>

        <div class="screen-body">
            <div class="view-layout" id="view-menu"></div>

            <div class="view-now-playing" id="view-now-playing">
                <img src="" id="np-cover" class="album-art" alt="Cover">
                <div class="np-info">
                    <div class="np-title" id="np-title">Назва</div>
                    <div class="np-artist" id="np-artist">Артист</div>
                </div>
                
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <div class="progress-bar-outer">
                        <div class="progress-bar-inner" id="track-progress"></div>
                    </div>
                    <span id="time-total">-0:00</span>
                </div>
            </div>
        </div>
    </div>

    <div class="wheel-container" id="wheel">
        <div class="wheel-label label-menu">MENU</div>
        
        <div class="wheel-label label-prev">
            <svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </div>
        
        <div class="wheel-label label-next">
            <svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M16 6h2v12h-2zm-10.5 12l8.5-6-8.5-6z"/></svg>
        </div>
        
        <div class="wheel-label label-play">
            <svg viewBox="0 0 36 18" width="100%" height="100%">
                <path d="M4 2v14l9-7z"/>
                <path d="M19 2h3v14h-3zm6 0h3v14h-3z"/>
            </svg>
        </div>
        
        <div class="center-button" id="btn-center"></div>
    </div>

    <script>
        const defaultTracks = [
            { id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up', artist: 'Rick Astley' },
            { id: 'jfKfPfyJRdk', title: 'Lofi Girl Beats', artist: 'Lofi Girl' },
            { id: '9XAS9G7m0VE', title: 'Interstellar Theme', artist: 'Hans Zimmer' },
            { id: 'V1Pl8CzNzCw', title: 'Blinding Lights', artist: 'The Weeknd' }
        ];

        let myTracks = [];
        try {
            myTracks = JSON.parse(localStorage.getItem('ipod_flat_tracks'));
        } catch(e) { myTracks = []; }
        
        if (!myTracks || !Array.isArray(myTracks) || myTracks.length === 0) {
            myTracks = defaultTracks;
            localStorage.setItem('ipod_flat_tracks', JSON.stringify(myTracks));
        }

        let selectedIndex = 0;
        let playingIndex = null;
        let currentView = 'menu';
        
        let player;
        let progressInterval;
        let touchTimeout = null;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
                events: { 
                    'onStateChange': onPlayerStateChange,
                    'onReady': () => { startProgressLoop(); }
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                nextTrack();
            }
        }

        const menuView = document.getElementById('view-menu');
        
        // ЧИСТИЙ ОРИГІНАЛЬНИЙ РЕНДЕР (Artist - Title)
        function renderTracksMenu() {
            menuView.innerHTML = '';
            document.getElementById('header-title').textContent = `Музика (${myTracks.length})`;

            myTracks.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `menu-item ${index === selectedIndex ? 'active' : ''}`;
                
                // Рядок у класичному форматі плеєра
                div.textContent = `${track.artist} - ${track.title}`;

                div.addEventListener('click', () => {
                    selectedIndex = index;
                    renderTracksMenu();
                    playClickSound();
                });

                // ВИДАЛЕННЯ ЧЕРЕЗ LONG PRESS
                div.addEventListener('touchstart', (e) => {
                    touchTimeout = setTimeout(() => {
                        askDeleteTrack(index);
                    }, 1000);
                });

                div.addEventListener('touchend', () => {
                    if (touchTimeout) clearTimeout(touchTimeout);
                });

                menuView.appendChild(div);
            });

            const activeEl = document.querySelector('.menu-item.active');
            if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        }
        renderTracksMenu();

        function askDeleteTrack(index) {
            const track = myTracks[index];
            const confirmDelete = confirm(`Видалити трек "${track.artist} - ${track.title}"?`);
            if (confirmDelete) {
                myTracks.splice(index, 1);
                localStorage.setItem('ipod_flat_tracks', JSON.stringify(myTracks));
                
                if (selectedIndex >= myTracks.length) {
                    selectedIndex = Math.max(0, myTracks.length - 1);
                }
                renderTracksMenu();
            }
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.03);
            gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        const wheel = document.getElementById('wheel');
        let lastAngle = 0;
        let angleAccumulator = 0;

        wheel.addEventListener('touchstart', (e) => {
            const rect = wheel.getBoundingClientRect();
            const x = e.touches[0].clientX - (rect.left + rect.width / 2);
            const y = e.touches[0].clientY - (rect.top + rect.height / 2);
            lastAngle = Math.atan2(y, x) * (180 / Math.PI);
        });

        wheel.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = wheel.getBoundingClientRect();
            const x = e.touches[0].clientX - (rect.left + rect.width / 2);
            const y = e.touches[0].clientY - (rect.top + rect.height / 2);
            let currentAngle = Math.atan2(y, x) * (180 / Math.PI);
            
            let delta = currentAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            angleAccumulator += delta;
            lastAngle = currentAngle;

            if (Math.abs(angleAccumulator) > 18) {
                const direction = angleAccumulator > 0 ? 1 : -1;

                if (currentView === 'menu') {
                    selectedIndex = Math.max(0, Math.min(selectedIndex + direction, myTracks.length - 1));
                    renderTracksMenu();
                    playClickSound();
                } else if (currentView === 'nowPlaying' && player) {
                    const currentTime = player.getCurrentTime();
                    let newTime = currentTime + (direction * 4); 
                    const duration = player.getDuration();
                    
                    if (newTime < 0) newTime = 0;
                    if (newTime > duration) newTime = duration;
                    
                    player.seekTo(newTime, true);
                    updateProgressBar(newTime, duration);
                    playClickSound();
                }
                angleAccumulator = 0;
            }
        });

        let pauseClickCount = 0;
        let pauseClickTimer = null;

        wheel.addEventListener('click', (e) => {
            const rect = wheel.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (x < 65 && y > 60 && y < rect.height - 60) {
                playClickSound();
                prevTrack();
                return;
            }

            if (x > rect.width - 65 && y > 60 && y < rect.height - 60) {
                playClickSound();
                nextTrack();
                return;
            }

            if (y < 60) {
                playClickSound();
                if (currentView === 'nowPlaying') {
                    currentView = 'menu';
                    document.getElementById('view-menu').style.display = 'flex';
                    document.getElementById('view-now-playing').style.display = 'none';
                    renderTracksMenu();
                }
                return;
            }

            if (y > rect.height - 60) {
                playClickSound();
                
                pauseClickCount++;
                if (pauseClickTimer) clearTimeout(pauseClickTimer);
                
                if (pauseClickCount === 3) {
                    document.body.classList.toggle('aluminum-theme');
                    
                    const isSpaceGray = document.body.classList.contains('aluminum-theme');
                    const iconColor = isSpaceGray ? 'black' : 'white';
                    document.querySelector("link[rel='icon']").href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2280%22 font-size=%2280%22 fill=%22${iconColor}%22></text></svg>`;

                    pauseClickCount = 0;
                    return;
                }
                
                pauseClickTimer = setTimeout(() => {
                    if (pauseClickCount === 1 && player) {
                        const state = player.getPlayerState();
                        if (state === YT.PlayerState.PLAYING) player.pauseVideo();
                        else player.playVideo();
                    }
                    pauseClickCount = 0;
                }, 350);
            }
        });

        let centerClickCount = 0;
        let centerClickTimer = null;

        document.getElementById('btn-center').addEventListener('click', () => {
            playClickSound();
            centerClickCount++;
            if (centerClickTimer) clearTimeout(centerClickTimer);

            if (centerClickCount === 3) {
                addNewFlatTrack();
                centerClickCount = 0;
                return;
            }

            centerClickTimer = setTimeout(() => {
                if (centerClickCount === 1) {
                    if (currentView === 'menu' && myTracks[selectedIndex]) {
                        if (playingIndex === selectedIndex) {
                            currentView = 'nowPlaying';
                            document.getElementById('view-menu').style.display = 'none';
                            document.getElementById('view-now-playing').style.display = 'flex';
                            document.getElementById('header-title').textContent = 'Now Playing';
                        } else {
                            playingIndex = selectedIndex;
                            playTrack(myTracks[selectedIndex]);
                        }
                    }
                }
                centerClickCount = 0;
            }, 350);
        });

        function playTrack(track) {
            currentView = 'nowPlaying';
            document.getElementById('view-menu').style.display = 'none';
            document.getElementById('view-now-playing').style.display = 'flex';
            document.getElementById('header-title').textContent = 'Now Playing';

            document.getElementById('np-title').textContent = track.title;
            document.getElementById('np-artist').textContent = track.artist;
            document.getElementById('np-cover').src = `https://img.youtube.com/vi/${track.id}/hqdefault.jpg`;

            if (player) {
                player.loadVideoById(track.id);
                player.playVideo();
            }
        }

        function nextTrack() {
            if (myTracks.length > 0) {
                playingIndex = (playingIndex === null) ? 0 : (playingIndex + 1) % myTracks.length;
                selectedIndex = playingIndex;
                playTrack(myTracks[playingIndex]);
            }
        }

        function prevTrack() {
            if (myTracks.length > 0) {
                playingIndex = (playingIndex === null) ? 0 : (playingIndex - 1 + myTracks.length) % myTracks.length;
                selectedIndex = playingIndex;
                playTrack(myTracks[playingIndex]);
            }
        }

        function startProgressLoop() {
            progressInterval = setInterval(() => {
                if (player && currentView === 'nowPlaying' && player.getPlayerState() === YT.PlayerState.PLAYING) {
                    updateProgressBar(player.getCurrentTime(), player.getDuration());
                }
            }, 1000);
        }

        function updateProgressBar(current, duration) {
            if (!duration) return;
            const percentage = (current / duration) * 100;
            document.getElementById('track-progress').style.width = `${percentage}%`;
            document.getElementById('time-current').textContent = formatTime(current);
            document.getElementById('time-total').textContent = "-" + formatTime(duration - current);
        }

        function formatTime(time) {
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function addNewFlatTrack() {
            const url = prompt("Встав посилання на YouTube відео:");
            if (!url) return;

            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            
            if (match && match[2].length === 11) {
                const videoId = match[2];
                const artist = prompt("Введіть виконавця:") || "Unknown Artist";
                const title = prompt("Введіть назву пісні:") || "New Song";
                
                myTracks.push({ id: videoId, title: title, artist: artist });
                localStorage.setItem('ipod_flat_tracks', JSON.stringify(myTracks));
                
                alert("Трек успішно додано!");
                renderTracksMenu();
            } else {
                alert("Посилання не розпізнано!");
            }
        }
    </script>
</body>
</html>
